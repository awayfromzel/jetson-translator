name: TTS Service CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      SKIP_VOICE_LOAD: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tts_service/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -f tts_service/Dockerfile -t jetson-translator-tts .
